name: Sync Calendar

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'sync.php'
      - 'composer.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install dev dependencies for tests
        run: composer install --optimize-autoloader

      - name: Run tests
        run: ./vendor/bin/phpunit tests/

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Run calendar sync
        run: php sync.php

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ output/
          git diff --staged --quiet || git commit -m "chore: sync calendar"
          git push

      - name: Send failure email
        if: failure()
        env:
          SMTP_URL: ${{ secrets.SMTP_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          curl --ssl-reqd \
            --url "$SMTP_URL" \
            --user "$SMTP_USER:$SMTP_PASSWORD" \
            --mail-from "$MAIL_FROM" \
            --mail-rcpt "$MAIL_TO" \
            --upload-file - <<EOF
          From: $MAIL_FROM
          To: $MAIL_TO
          Subject: Calendar sync failed

          Synchronizace kalendare selhala.

          Repository: ${{ github.repository }}
          Workflow: ${{ github.workflow }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Zkontrolujte strukturu webu nebo logy workflow.
          EOF
